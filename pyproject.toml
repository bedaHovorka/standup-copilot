[project]
name = "mcp-langgraph-agent"
version = "1.0.0"
description = "Developer standup copilot: LangGraph agent with MCP tools, local Ollama LLM, SQLite memory"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "langgraph>=1.0",
    "langgraph-checkpoint-sqlite>=3.1",
    "langchain>=1.0",
    "langchain-ollama>=0.2",
    "langchain-mcp-adapters>=0.1",
    "mcp>=1.9",
    "python-dotenv>=1.0",
    "requests>=2.31",
]

[tool.uv]
# lockfile (uv.lock) is generated by `uv sync` and should be committed
